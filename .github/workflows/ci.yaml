name: CI

on:
  push:
    paths:
      - "plugins/**"
      - "schemas/**"
      - "scripts/**"
      - ".cursor/rules/**"
      - ".cursor-plugin/**"
      - ".github/workflows/ci.yaml"
      - "AGENTS.md"
      - "Makefile"
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Documentation and consistency checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2

      - name: Run checks
        run: make checks
