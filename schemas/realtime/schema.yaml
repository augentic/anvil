name: realtime
version: 1
description: Realtime workflow
extends: https://github.com/augentic/specify/schemas/omnia

terminology:
  unit: capability
  unit-plural: capabilities
  unit-heading: Capabilities

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document
    template: proposal.md
    instruction: instructions/proposal.md
    requires: []
    validate:
      - Has a Why section with at least one sentence
      - Has a Source section identifying Repository or Manual
      - Has a Capabilities section listing at least one new or modified capability
      - Capability names are kebab-case
    validate-checks:
      - check: heading-exists
        heading: "## Why"
        min-content-lines: 1
      - check: heading-exists
        heading: "## Source"
        content-matches: "Repository|Manual"
      - check: heading-exists
        heading: "## Capabilities"
        min-content-lines: 1
      - check: pattern-match
        scope: capability-names
        pattern: "^[a-z][a-z0-9]*(-[a-z0-9]+)*$"

cross-artifact-checks:
  - check: proposal-capabilities-have-specs
    description: Every capability listed in the proposal has a corresponding spec file under specs/
  - check: design-references-valid
    description: Requirement IDs (REQ-XXX) referenced in design.md exist in spec files
  - check: spec-format-valid
    description: All spec files match the heading structure defined in spec-format
