name: realtime
version: 1
description: Realtime workflow
extends: https://github.com/augentic/specify/schemas/omnia

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document
    requires: []
    validate:
      - Has a Why section with at least one sentence
      - Has a Source section identifying Repository or Manual
      - Has a Crates section listing at least one new or modified crate
      - Crate names are kebab-case
