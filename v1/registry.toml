# Service catalog
# 
# maps every service to its repo, crate, domain, and the capabilities it owns.
# The proposal-generator and pipeline read this to discover what exists across
# the platform.

# -----------------------------------------------
# Domain Train
# -----------------------------------------------
[[services]]
id = "common"
repo = "git@github.com:wasm-replatform/train.git"
project_dir = "."
crate = "common"
domain = "train"
capabilities = [
  "block-management-client",
  "fleet-client",
]

[[services]]
id = "dilax-apc-connector"
repo = "git@github.com:wasm-replatform/train.git"
project_dir = "."
crate = "dilax-apc-connector"
domain = "train"
capabilities = [
  "dilax-apc-ingest",
]

[[services]]
id = "dilax-adapter"
repo = "git@github.com:wasm-replatform/train.git"
project_dir = "."
crate = "dilax-adapter"
domain = "train"
capabilities = [
  "dilax-apc-enrichment",
  "dilax-apc-detection",
]

[[services]]
id = "r9k-connector"
repo = "git@github.com:wasm-replatform/train.git"
project_dir = "."
crate = "r9k-connector"
domain = "train"
capabilities = [
  "r9k-xml-ingest",
]

[[services]]
id = "r9k-adapter"
repo = "git@github.com:wasm-replatform/train.git"
project_dir = "."
crate = "r9k-adapter"
domain = "train"
capabilities = [
  "r9k-xml-to-smartrak-gtfs",
]

[[services]]
id = "smartrak-gtfs"
repo = "git@github.com:wasm-replatform/train.git"
project_dir = "."
crate = "smartrak-gtfs"
domain = "train"
capabilities = [
  "gtfs-vehicle-position",
  "dead-reckoning",
  "passenger-count",
  "vehicle-info",
  "god-mode",
]

